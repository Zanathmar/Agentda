name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON=${{ secrets.SUPABASE_ANON }}

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          name: "Agentda ${{ github.ref_name }}"
          body: |
            Download `app-release.apk` below and install it on your Android phone.

            **First time installing?**
            You may need to allow installs from unknown sources:
            Settings → Apps → Special app access → Install unknown apps → your browser → Allow
          files: build/app/outputs/flutter-apk/app-release.apk